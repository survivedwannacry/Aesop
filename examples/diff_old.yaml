system:
  name: support-agent
  type: llm-agent
  description: Basic support chatbot (v1)

exposure:
  internet_facing: false
  users:
    - internal_support_team

model:
  provider: openai
  model_family: gpt-3.5-class
  hosted: external_api

interfaces:
  - type: internal_chat
    auth: sso

tools:
  - name: jira
    permissions:
      - read_tickets
    trust_boundary: external_service

retrieval:
  enabled: false

memory:
  enabled: false

secrets:
  - name: openai_api_key
    scope: backend

data:
  sensitivity:
    - internal

trust_boundaries:
  - backend
  - external_llm_provider
